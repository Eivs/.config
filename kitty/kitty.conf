
# ---------------------------------------------------------------------------
#  字体设置
# ---------------------------------------------------------------------------
font_family      RobotoMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        15.0

font_features   RobotoMono Nerd Font +liga +calt +zero
disable_ligatures never

# macOS 字体渲染（0 = 不额外加粗，保留原样）
macos_thicken_font 1

# ---------------------------------------------------------------------------
#  主题配色（从外部文件导入）
# ---------------------------------------------------------------------------
include ./snazzy.conf

# ---------------------------------------------------------------------------
#  光标
# ---------------------------------------------------------------------------
cursor_shape           beam
cursor_blink_interval  0.5
cursor_trail           1

# ---------------------------------------------------------------------------
#  背景 & 透明度
# ---------------------------------------------------------------------------
background_opacity           1
dynamic_background_opacity   yes

# macOS 窗口背景模糊（0.5 轻度模糊，数值越大越模糊）
macos_window_background_blur 0
macos_titlebar_color         background

# ---------------------------------------------------------------------------
#  窗口 & 内边距
# ---------------------------------------------------------------------------
window_padding_width   4
window_margin_width    4
window_border_width    2.5px
active_border_color    #57c7ff
inactive_border_color  #21222c

# 初始窗口大小
initial_window_width  900
initial_window_height 600
remember_window_size  yes
initial_window_position proportional

# 窗口标题显示
macos_show_window_title_in all

# 关闭最后一个窗口时是否退出 Kitty
confirm_os_window_close 1
close_on_child_death    no

# ---------------------------------------------------------------------------
#  Tab 栏（顶部 + 斜角风格）
# ---------------------------------------------------------------------------
tab_bar_edge          top
tab_bar_style         powerline
tab_powerline_style   slanted
tab_activity_symbol none
tab_bar_min_tabs      2
tab_bar_margin_width  0.0
tab_bar_margin_height 0.0 0.0

# Tab 颜色
active_tab_foreground   #2a2c33
active_tab_background   #50fb7c
inactive_tab_foreground #aeb2be
inactive_tab_background #414451

# ---------------------------------------------------------------------------
#  布局（默认 Tall，支持多种布局切换）
# ---------------------------------------------------------------------------
enabled_layouts Tall, Splits, Grid, Horizontal, Stack
layout Tall

# ---------------------------------------------------------------------------
#  Shell
# ---------------------------------------------------------------------------
shell                          zsh
shell_integration              enabled
term                           xterm-kitty
editor                         vim

# ---------------------------------------------------------------------------
#  URL & 超链接
# ---------------------------------------------------------------------------
allow_hyperlinks               yes
url_style                      curly
open_url_with                  default

# ---------------------------------------------------------------------------
#  剪贴板 & 选择
# ---------------------------------------------------------------------------
copy_on_select                 yes
clipboard_control              write-clipboard write-primary

# ---------------------------------------------------------------------------
#  滚动缓冲区
# ---------------------------------------------------------------------------
scrollback_lines               10000
wheel_scroll_multiplier        5.0
touch_scroll_multiplier        1.0
scrollback_fill_enlarged_window yes

# ---------------------------------------------------------------------------
#  远程控制
# ---------------------------------------------------------------------------
allow_remote_control           yes

# ---------------------------------------------------------------------------
#  快捷键（macOS 原生风格）
# ---------------------------------------------------------------------------

# 窗口分割（注意：d 和 r 与你的原有配置一致）
map cmd+d launch --location=hsplit
map cmd+r launch --location=vsplit
map cmd+w close_window
map cmd+[ previous_window
map cmd+] next_window
map cmd+t new_tab_with_cwd
map cmd+, edit_config_file

# Tab 切换
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# 布局切换
map cmd+shift+l next_layout

# 滚动
map cmd+page_up      scroll_page_up
map cmd+page_down    scroll_page_down
map cmd+home         scroll_home
map cmd+end          scroll_end

# 字体大小实时调整
map ctrl+cmd+minus   change_font_size current -1.0
map ctrl+cmd+equal   change_font_size current +1.0
map ctrl+cmd+0       change_font_size all 0

# 透明度实时调整
map ctrl+cmd+[       set_background_opacity -0.05
map ctrl+cmd+]       set_background_opacity +0.05
map ctrl+cmd+delete  set_background_opacity 0.98

# 复制粘贴
map cmd+c            copy_to_clipboard
map cmd+v            paste_from_clipboard
map cmd+shift+s      open_url_with_hints

# 清屏
map cmd+l            clear_terminal_and_scrollback reset

# 关闭窗口/退出
map cmd+shift+q      close_os_window_with_confirm

# ---------------------------------------------------------------------------
#  鼠标
# ---------------------------------------------------------------------------
mouse_hide_wait 2.0
